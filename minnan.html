<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>閩南語 TTS Demo</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='56'%3E🗣%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <h1>閩南語文字轉語音</h1>

  <input id="textInput" type="text" value="Lí-hó"> <!-- 建議用台羅拼音 -->
  <button id="playTTS">播放閩南語語音</button>
  <br><br>
  <audio id="audioPlayer" controls></audio>
  <div id="errorMsg" style="color:red;"></div>

  <script>
    const API_URL = "https://happy0708-minnan-test.hf.space/gradio_api/call/v2/tts";
    const EVENT_URL = "https://happy0708-minnan-test.hf.space/gradio_api/call/v2/tts";

    function parseEventPayload(text) {
      const trimmedText = (text || "").trim();
      if (!trimmedText) {
        return null;
      }

      const dataLines = trimmedText
        .split(/\r?\n/)
        .filter((line) => line.startsWith("data:"));

      if (dataLines.length > 0) {
        const dataText = dataLines
          .map((line) => line.replace(/^data:\s*/, "").trim())
          .join("\n");

        try {
          return JSON.parse(dataText);
        } catch {
          // fall back to the raw text below
        }
      }

      try {
        return JSON.parse(trimmedText);
      } catch {
        return null;
      }
    }

    async function pollEvent(eventId) {
      const url = `${EVENT_URL}/${eventId}`;
      for (let i = 0; i < 20; i++) {
        const response = await fetch(url, { method: "GET" });
        const text = await response.text();
        console.log("poll", i, text);

        const result = parseEventPayload(text);
        console.log("parsed poll", i, result);

        const payload = result?.data?.[0] ?? result?.[0] ?? result;
        const fileItem = payload?.data?.[0] ?? payload;

        if (fileItem?.url) {
          return fileItem.url;
        }
        if (fileItem?.path) {
          return fileItem.path;
        }

        await new Promise((resolve) => setTimeout(resolve, 1000));
      }
      return null;
    }

    document.getElementById("playTTS").addEventListener("click", async () => {
      const text = document.getElementById("textInput").value;
      const errorDiv = document.getElementById("errorMsg");
      errorDiv.textContent = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        console.log("status", response.status);
        const bodyText = await response.text();
        console.log("body", bodyText);

        if (!response.ok) {
          errorDiv.textContent = "語音生成失敗：" + bodyText;
          return;
        }

        let result;
        try {
          result = JSON.parse(bodyText);
        } catch {
          errorDiv.textContent = "語音生成失敗：回傳內容不是 JSON";
          return;
        }

        const eventId = result?.event_id || result?.eventId;
        if (!eventId) {
          errorDiv.textContent = "語音生成失敗：Space 未回傳事件 ID";
          return;
        }

        const audioUrl = await pollEvent(eventId);
        if (!audioUrl) {
          errorDiv.textContent = "語音生成失敗：Space 未回傳音訊資料";
          return;
        }

        const normalizedAudioUrl = audioUrl.startsWith("http")
          ? audioUrl
          : `https://happy0708-minnan-test.hf.space/${audioUrl}`;

        const downloadUrl = normalizedAudioUrl;
        console.log("downloadUrl", downloadUrl);

        const audioResponse = await fetch(downloadUrl, {
          headers: { Accept: "audio/*" }
        });
        console.log("audio response status", audioResponse.status);
        console.log("audio response headers", Object.fromEntries(audioResponse.headers.entries()));

        if (!audioResponse.ok) {
          const text = await audioResponse.text();
          throw new Error(`無法下載音訊檔: ${audioResponse.status} ${text}`);
        }

        const arrayBuffer = await audioResponse.arrayBuffer();
        console.log("audio bytes", arrayBuffer.byteLength);

        const contentType = audioResponse.headers.get("content-type") || "";
        const inferredMimeType = contentType && contentType !== "application/octet-stream"
          ? contentType
          : (downloadUrl.toLowerCase().endsWith(".wav") ? "audio/wav" : "audio/mpeg");

        const audioBlob = new Blob([arrayBuffer], { type: inferredMimeType });
        const audioUrlObject = URL.createObjectURL(audioBlob);
        const audio = document.getElementById("audioPlayer");
        audio.crossOrigin = "anonymous";
        audio.src = audioUrlObject;
        audio.load();

        audio.addEventListener("canplaythrough", () => {
          audio.play().catch((playError) => {
            errorDiv.textContent = "播放失敗：" + playError.message;
          });
        }, { once: true });

        audio.addEventListener("error", () => {
          errorDiv.textContent = "播放失敗：音訊格式無法被瀏覽器播放";
        }, { once: true });
      } catch (e) {
        errorDiv.textContent = "語音生成失敗：" + e.message;
      }
    });
  </script>
</body>
</html>
